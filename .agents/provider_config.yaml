# Sử dụng DeepSeek API vì nó cực rẻ nhưng mạnh như GPT-4
- provider: "deepseek"
  base_url: "https://api.deepseek.com"
  api_key: "${DEEPSEEK_API_KEY}"
  model: "deepseek-coder"

# Hoặc sử dụng Local Ollama để hoàn toàn miễn phí
- provider: "ollama"
  base_url: "${OLLAMA_BASE_URL}"
  model: "qwen2.5-coder:14b"