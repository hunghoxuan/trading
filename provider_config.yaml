# ==========================================================
# Antigravity Provider Configuration Template
# ==========================================================
# This file defines the AI models available to the Antigravity agent.
# You can add more models here or in ~/.gemini/antigravity/provider_config.yaml
# for global access.
# ==========================================================

# --- High-Performance Coding Models (Cloud) ---

- provider: "deepseek"
  base_url: "https://api.deepseek.com"
  api_key: "${DEEPSEEK_API_KEY}"
  model: "deepseek-coder"

- provider: "openai"
  base_url: "https://api.openai.com/v1"
  api_key: "${OPENAI_API_KEY}"
  model: "gpt-4o"

- provider: "anthropic"
  base_url: "https://api.anthropic.com/v1"
  api_key: "${ANTHROPIC_API_KEY}"
  model: "claude-3-5-sonnet-20240620"

# --- Local Models (Ollama) ---

- provider: "ollama"
  base_url: "http://localhost:11434/v1"
  model: "qwen2.5:14b"

- provider: "ollama"
  base_url: "http://localhost:11434/v1"
  model: "codellama:7b"

# --- OpenRouter (All-in-one Gateway) ---
# Useful for accessing many models with one key

- provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1"
  api_key: "${OPENROUTER_API_KEY}"
  model: "meta-llama/llama-3.1-405b"

# --- Local Proxy / Web Bridge (9Router) ---
# Use this to bridge Grok Web/Subscription to an API
- provider: "9router"
  base_url: "http://localhost:20128/v1"
  model: "grok-beta"